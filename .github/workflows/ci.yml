name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check + Build (PWA)
        run: npm run build
        env:
          VITE_BASE: /tadericson/

      - name: Prepare SPA fallback (404.html)
        run: cp dist/index.html dist/404.html || true

      - name: Verify PWA output
        run: |
          test -f dist/index.html
          test -f dist/manifest.webmanifest
          test -f dist/sw.js
          echo "PWA artifacts present:"
          ls -l dist/manifest.webmanifest dist/sw.js dist/registerSW.js || true
